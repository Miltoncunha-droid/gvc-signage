<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GVC Signage Player</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
#stage{position:relative;width:100vw;height:100vh;}
.slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .9s ease;background:#000;}
.slide.active{opacity:1;}
.slide img{max-width:100%;max-height:100%;object-fit:contain;}
.slide video{max-width:100%;max-height:100%;object-fit:contain;}
#pbar-wrap{position:fixed;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.08);z-index:100;}
#pbar{height:100%;width:0%;background:#1DB88A;}
#status{position:fixed;bottom:10px;right:10px;display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.55);padding:4px 10px;border-radius:20px;z-index:200;opacity:.5;}
#sdot{width:6px;height:6px;border-radius:50%;background:#1DB88A;}
#sdot.off{background:#E53E3E;}
#stext{font-family:monospace;font-size:10px;color:rgba(255,255,255,.7);}
#msg{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-family:sans-serif;text-align:center;padding:32px;background:#000;z-index:300;}
#msg h2{font-size:18px;margin-bottom:10px;font-weight:500;}
#msg p{font-size:13px;color:rgba(255,255,255,.35);}
#msg.hidden{display:none;}
</style>
</head>
<body>
<div id="stage"></div>
<div id="pbar-wrap"><div id="pbar"></div></div>
<div id="status"><div id="sdot"></div><span id="stext">GVC Signage</span></div>
<div id="msg">
  <h2 id="msg-title">Carregando...</h2>
  <p id="msg-body">Aguarde.</p>
</div>
<script>
/* ─────────────────────────────────────────
   CONFIGURAÇÃO — não precisa alterar a URL
   ───────────────────────────────────────── */
const FB_CONFIG = {
  apiKey:      "AIzaSyDF4gr-qWtP1f2q08gAh5FqQechsUcMydg",
  authDomain:  "display-7c044.firebaseapp.com",
  projectId:   "display-7c044"
};

const INTERVAL = 5 * 60 * 1000; // recarrega playlist a cada 5 min
/* ───────────────────────────────────────── */

const TOKEN = new URLSearchParams(location.search).get('token') || '';

let db, playlist = [], idx = 0, slideTimer = null;

function setMsg(t,b=''){ document.getElementById('msg-title').textContent=t; document.getElementById('msg-body').textContent=b; document.getElementById('msg').classList.remove('hidden'); }
function hideMsg(){ document.getElementById('msg').classList.add('hidden'); }
function setStatus(t,on=true){ document.getElementById('stext').textContent=t; document.getElementById('sdot').className=on?'':'off'; }

async function init(){
  if(!TOKEN){ setMsg('Token não informado', 'Use: player.html?token=SEU_TOKEN'); return; }
  firebase.initializeApp(FB_CONFIG);
  db = firebase.firestore();
  setMsg('Conectando...','Buscando playlist...');
  await refreshPlaylist();
  setInterval(heartbeat, 60000);
  heartbeat();
  setInterval(async () => {
    const fresh = await fetchPlaylist();
    if(fresh && JSON.stringify(fresh) !== JSON.stringify(playlist)){
      playlist = fresh;
      buildSlides();
    }
  }, INTERVAL);
}

async function fetchPlaylist(){
  try{
    const devSnap = await db.collection('signage_devices')
      .where('token','==',TOKEN).limit(1).get();
    if(devSnap.empty) throw new Error('Dispositivo não encontrado para este token.');
    const dev = devSnap.docs[0].data();
    if(!dev.playlist_id) throw new Error('Nenhuma playlist atribuída. Configure no painel.');

    // Busca sem orderBy para evitar necessidade de índice composto
    const snap = await db.collection('signage_items')
      .where('playlist_id','==',dev.playlist_id).get();

    // Ordena no cliente
    const items = snap.docs
      .map(d => ({id:d.id,...d.data()}))
      .sort((a,b) => (a.ordem||0) - (b.ordem||0));

    setStatus(dev.nome + ' · ' + dev.unidade, true);
    return items;
  } catch(e){
    setStatus('Sem conexão', false);
    console.error('[Player]', e.message||e);
    return null;
  }
}

async function refreshPlaylist(){
  const items = await fetchPlaylist();
  if(!items){ if(playlist.length) return; setMsg('Sem conexão','Verificando rede...'); setTimeout(refreshPlaylist, 30000); return; }
  if(!items.length){ setMsg('Playlist vazia','Adicione conteúdo pelo painel.'); return; }
  playlist = items;
  hideMsg();
  buildSlides();
}

function buildSlides(){
  clearTimeout(slideTimer);
  const stage = document.getElementById('stage');
  const prevUrl = playlist[idx]?.url;
  stage.innerHTML = '';
  playlist.forEach((item,i) => {
    const slide = document.createElement('div');
    slide.className = 'slide'; slide.id = 'slide-'+i;
    if(item.tipo === 'imagem'){
      const img = document.createElement('img');
      img.src = item.url; img.alt = '';
      img.onerror = () => slide.style.background = '#111';
      slide.appendChild(img);
    } else {
      const vid = document.createElement('video');
      vid.src = item.url; vid.muted = true; vid.playsInline = true; vid.preload = 'auto';
      vid.addEventListener('ended', nextSlide);
      vid.addEventListener('error', () => setTimeout(nextSlide, 3000));
      slide.appendChild(vid);
    }
    stage.appendChild(slide);
  });
  const ni = playlist.findIndex(it => it.url === prevUrl);
  idx = ni >= 0 ? ni : 0;
  showSlide(idx);
}

function showSlide(i){
  clearTimeout(slideTimer); stopProgress();
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  const slide = document.getElementById('slide-'+i);
  if(!slide) return;
  slide.classList.add('active');
  const item = playlist[i];
  if(item.tipo === 'imagem'){
    const ms = (item.duracao||10) * 1000;
    startProgress(ms);
    slideTimer = setTimeout(nextSlide, ms);
  } else {
    const vid = slide.querySelector('video');
    if(!vid) return;
    vid.currentTime = 0;
    vid.play().catch(() => { vid.muted=true; vid.play().catch(() => setTimeout(nextSlide,5000)); });
    const wi = setInterval(() => {
      if(vid.duration && !isNaN(vid.duration)){ clearInterval(wi); startProgress(vid.duration*1000); }
    }, 300);
  }
}

function nextSlide(){ idx = (idx+1) % playlist.length; showSlide(idx); }

let progRAF = null, progStart = 0, progDur = 0;
function startProgress(ms){
  stopProgress(); progStart = performance.now(); progDur = ms;
  const bar = document.getElementById('pbar');
  bar.style.width = '0%';
  function tick(now){ const p = Math.min(100, ((now-progStart)/progDur)*100); bar.style.width=p+'%'; if(p<100) progRAF=requestAnimationFrame(tick); }
  progRAF = requestAnimationFrame(tick);
}
function stopProgress(){ if(progRAF) cancelAnimationFrame(progRAF); document.getElementById('pbar').style.width='0%'; }

async function heartbeat(){
  if(!db||!TOKEN) return;
  try{
    const snap = await db.collection('signage_devices').where('token','==',TOKEN).limit(1).get();
    if(!snap.empty) await snap.docs[0].ref.update({ ultimo_ping: firebase.firestore.FieldValue.serverTimestamp() });
  } catch(e){}
}

init();
</script>
</body>
</html>
